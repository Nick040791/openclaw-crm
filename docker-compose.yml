version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openclaw_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  crm:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://crm_user:crm_pass@postgres:5432/openclaw_crm
      NODE_ENV: development
      # OPENCLAW_GATEWAY_URL: http://openclaw:18789  # uncomment when OpenClaw added
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    # command: npm run dev  # when package.json exists

volumes:
  postgres_data:

# Note: Add OpenClaw service when ready for full stack testing
